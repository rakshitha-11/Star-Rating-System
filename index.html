<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Star Rating System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>⭐ Rate Our Service</h1>
        <p class="subtitle">Your feedback helps us improve!</p>

        <div class="star-container">
            <span class="star" data-value="1">&#9733;</span>
            <span class="star" data-value="2">&#9733;</span>
            <span class="star" data-value="3">&#9733;</span>
            <span class="star" data-value="4">&#9733;</span>
            <span class="star" data-value="5">&#9733;</span>
        </div>

        <p id="rating-text">Select a rating</p>

        <textarea id="feedback" placeholder="Write your feedback here..."></textarea>

        <button id="submitBtn">Submit Rating</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
